<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStream - Premium Music</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="animated-bg">
        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>
        <div class="bg-blob blob-3"></div>
    </div>
    <div class="glass-overlay"></div>

    <div id="app">
        <!-- Auth Container -->
        <div id="auth-container" class="active glass-panel">
            <div class="auth-box">
                <div class="logo-glow">
                    <i class="fas fa-headphones-alt auth-logo"></i>
                </div>
                <h2>VibeStream</h2>
                <p class="subtitle">Premium Sound Architecture</p>
                <form id="login-form">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="gradient-btn">UNLOCK SOUND</button>
                </form>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div id="dashboard-container" class="hidden">
            <div class="main-wrapper">
                <!-- Sidebar -->
                <aside class="sidebar glass-panel">
                    <div class="sidebar-logo">
                        <i class="fas fa-headphones-alt"></i> <span>VibeStream</span>
                    </div>
                    <ul class="nav-links">
                        <li class="active" data-view="home"><i class="fas fa-compass"></i> <span>Discover</span></li>
                        <li data-view="search"><i class="fas fa-search"></i> <span>Search</span></li>
                        <li data-view="library"><i class="fas fa-heart"></i> <span>Library</span></li>
                    </ul>
                    <hr class="sidebar-divider">
                    <div class="playlists-scroll">
                        <h4>GENRES</h4>
                        <p class="playlist-item" data-query="pop hits">Pop Hits</p>
                        <p class="playlist-item" data-query="rock">Rock</p>
                        <p class="playlist-item" data-query="rap">Rap & Hip Hop</p>
                        <p class="playlist-item" data-query="classical">Classical</p>
                        <p class="playlist-item" data-query="lofi">Lofi Chill</p>
                        <p class="playlist-item" data-query="electronic">Electronic</p>
                        <p class="playlist-item" data-query="jazz">Jazz</p>
                        <p class="playlist-item" data-query="country">Country</p>
                    </div>
                </aside>

                <!-- Main Content -->
                <main class="main-content glass-panel">
                    <header class="topbar">
                        <div class="search-container hidden" id="search-bar-container">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="search-input" placeholder="Artist, songs, or albums...">
                        </div>
                        <div class="topbar-user">
                            <button class="upgrade-btn">PREMIUM</button>
                            <div class="user-profile">
                                <img src="https://ui-avatars.com/api/?name=Vibe+User&background=9d4edd&color=fff" alt="User">
                            </div>
                        </div>
                    </header>
                    <div class="content-scroll" id="content-area">
                        <h2 id="section-title" class="neon-text">Discover</h2>
                        
                        <div class="loading-spinner hidden" id="loader">
                            <div class="spinner"></div>
                        </div>

                        <div class="album-grid" id="songs-grid">
                            <!-- Songs injected here -->
                        </div>
                    </div>
                </main>
            </div>

            <!-- Player Bar -->
            <div class="player-bar glass-panel">
                <div class="now-playing">
                    <div class="cover-wrapper">
                        <img id="current-cover" src="https://via.placeholder.com/60" alt="Cover" class="hidden">
                        <div class="cover-glow hidden" id="cover-glow"></div>
                    </div>
                    <div class="track-info">
                        <div id="current-title" class="title">No Track Selected</div>
                        <div id="current-artist" class="artist">Select music to start</div>
                    </div>
                    <button class="control-btn fav-btn hidden" id="player-fav-btn"><i class="far fa-star"></i></button>
                </div>
                
                <div class="player-controls">
                    <div class="control-buttons">
                        <button class="control-btn"><i class="fas fa-random"></i></button>
                        <button class="control-btn" id="prev-btn"><i class="fas fa-step-backward"></i></button>
                        <button class="control-btn play-pause-btn" id="main-play-btn"><i class="fas fa-play"></i></button>
                        <button class="control-btn" id="next-btn"><i class="fas fa-step-forward"></i></button>
                        <button class="control-btn"><i class="fas fa-redo-alt"></i></button>
                    </div>
                    <div class="progress-container">
                        <span id="current-time">0:00</span>
                        <div class="progress-bar" id="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <span id="total-time">0:30</span>
                    </div>
                </div>

                <div class="extra-controls">
                    <button class="lyrics-btn" id="toggle-lyrics">LYRICS</button>
                    <div class="volume-controls">
                        <i class="fas fa-volume-up"></i>
                        <div class="volume-bar" id="volume-bar">
                            <div class="volume-fill" id="volume-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lyrics Overlay -->
    <div id="lyrics-overlay">
        <i class="fas fa-times close-lyrics" id="close-lyrics"></i>
        <div class="lyrics-content">
            <div class="lyrics-header">
                <h1 id="lyrics-title">Song Title</h1>
                <p id="lyrics-artist">Artist Name</p>
            </div>
            <div class="lyrics-body" id="lyrics-body">
                <p>Fetching lyrics...</p>
            </div>
        </div>
    </div>
    
    <audio id="audio-player"></audio>
    <script src="app.js"></script>
</body>
</html>
